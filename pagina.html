<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Love Animation</title>

<!-- Fuente bonita -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    cursor: pointer;
}

/* TEXTO */
.love-text {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 60px;
    color: hotpink;
    font-family: 'Pacifico', cursive;
    text-align: center;
    animation: brillo 2s infinite alternate;
}

/* EFECTO BRILLO */
@keyframes brillo {
    from {
        text-shadow: 0 0 10px pink, 0 0 20px red, 0 0 30px hotpink;
    }
    to {
        text-shadow: 0 0 20px red, 0 0 40px pink, 0 0 60px hotpink;
    }
}

/* CANVAS */
canvas {
    position: absolute;
    top: 0;
    left: 0;
}
</style>
</head>

<body>

<!-- TEXTO -->
<h1 class="love-text" id="text">Te Amo 💖</h1>

<!-- PARTÍCULAS -->
<canvas id="canvas"></canvas>

<script>
// TEXTO DINÁMICO
const text = document.getElementById("text");

const frases = [
    "Te Amo 💖",
    "Mirella 💕",
    "Eres perfecta 😍",
    "Nunca te vayas 💫",
    "Eres mi mundo 🌍",
    "Contigo todo es mejor ✨"
];

let index = 0;

document.body.addEventListener("click", () => {
    index++;
    if (index >= frases.length) index = 0;
    text.innerText = frases[index];
});


// PARTÍCULAS
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

class Particle {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height;
        this.size = Math.random() * 5 + 2;
        this.speedY = Math.random() * 2 + 1;
        this.color = "rgba(255, 20, 147, 0.8)";
    }

    update() {
        this.y -= this.speedY;
        if (this.y < 0) {
            this.y = canvas.height;
            this.x = Math.random() * canvas.width;
        }
    }

    draw() {
        ctx.beginPath();
        ctx.fillStyle = this.color;
        ctx.shadowColor = "hotpink";
        ctx.shadowBlur = 15;
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function init() {
    for (let i = 0; i < 100; i++) {
        particles.push(new Particle());
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        p.update();
        p.draw();
    });

    requestAnimationFrame(animate);
}

init();
animate();
</script>

</body>
</html>
